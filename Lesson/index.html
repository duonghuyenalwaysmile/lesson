<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>HuyenDTT's Lesson</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    overflow-x:hidden;
    user-select:none;
    -webkit-user-select:none;
}

.login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
}

.box{
    width:320px;
    background:#1e1e1e;
    padding:24px;
    border-radius:16px;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:16px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
}

.viewer{
    display:none;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.slide{
    margin-bottom:24px;
}

.slide img{
    width:100%;
    border-radius:16px;
    pointer-events:none;
}

.watermark{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:999;
}

.watermark span{
    position:absolute;
    color:rgba(255,255,255,0.07);
    font-size:22px;
    transform:rotate(-25deg);
}

</style>

</head>
<body>

<div class="login" id="login">

    <div class="box">

        <h2>Lesson Access</h2>

        <input id="student" placeholder="Student name">

        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Open Lesson</button>

    </div>

</div>

<div class="watermark" id="watermark"></div>

<div class="viewer" id="viewer">

 <div class="slide">
    <img src="slides/slide1.png">
</div>

<div class="slide">
    <img src="slides/slide2.png">
</div>

<div class="slide">
    <img src="slides/slide3.png">
</div>

</div>

<script>

const SUPABASE_URL = "https://bgyoluuagtvabsrkfniw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJneW9sdXVhZ3R2YWJzcmtmbml3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzU4OTQsImV4cCI6MjA5NTYxMTg5NH0.TURq0AVfxOQ6RJ59pFCJ2gYxBXEei-O5OroMpGOwmi4";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

function getDeviceHash(){

    return btoa(
        navigator.userAgent +
        screen.width +
        screen.height +
        navigator.language +
        Intl.DateTimeFormat().resolvedOptions().timeZone
    );

}

async function login(){

    const student =
        document.getElementById("student").value;

    const password =
        document.getElementById("password").value;

    const deviceHash = getDeviceHash();

    const { data, error } = await supabaseClient
    .from("students")
    .select("*")
    .eq("student_name", student)
    .eq("password", password)
    .eq("active", true);

    if(error || !data || data.length === 0){

        alert("Wrong account");

        return;
    }

    const user = data[0];

    if(user.device_hash){

        if(user.device_hash !== deviceHash){

            alert("This lesson is already activated on another device.");

            return;
        }

    }else{

        await supabaseClient
        .from("students")
        .update({
            device_hash: deviceHash
        })
        .eq("student_name", student);

    }

    startViewer(student);

}

function startViewer(student){

    document.getElementById("login").style.display = "none";

    document.getElementById("viewer").style.display = "block";

    createWatermark(student);

}

function createWatermark(student){

    const wm = document.getElementById("watermark");

    for(let i=0;i<24;i++){

        const span = document.createElement("span");

        span.innerText =
            student + " | Protected Lesson";

        span.style.left =
            Math.random()*100 + "%";

        span.style.top =
            Math.random()*100 + "%";

        wm.appendChild(span);

    }

}

document.addEventListener("contextmenu", e=>{
    e.preventDefault();
});

document.addEventListener("copy", e=>{
    e.preventDefault();
});

document.addEventListener("keydown", e=>{

    if(e.ctrlKey && e.key==="c"){
        e.preventDefault();
    }

    if(e.ctrlKey && e.key==="s"){
        e.preventDefault();
    }

    if(e.ctrlKey && e.key==="p"){
        e.preventDefault();
    }

});

</script>

</body>
</html>
